services:
  - type: web
    name: reentry-to-recovery
    runtime: node
    buildCommand: bun install --frozen-lockfile && bun run build
    startCommand: node server-start.mjs
    healthCheckPath: /api/health
    envVars:
      # Build-time: embedded into the client bundle by Vite
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      # Runtime: read by server-side code via process.env
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TESTER_FACILITY
        sync: false
      # Set to the header Render guarantees is the real client IP (not client-forgeable).
      # Check Render docs for your plan tier. Leave unset to use x-forwarded-for leftmost entry.
      - key: TRUSTED_IP_HEADER
        sync: false
      # Required for HMAC-signed signup captcha tokens and inmate PIN hashing.
      # Generate with: openssl rand -hex 32
      - key: SIGNUP_CHALLENGE_SECRET
        sync: false
      # SHA-256 hex of the site passkey string used for IP-gating bypass.
      # Generate with: echo -n "your-passkey" | openssl dgst -sha256
      - key: SITE_PASSKEY_HASH
        sync: false
